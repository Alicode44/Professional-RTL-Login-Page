<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود به حساب کاربری</title>
<!-- Bootstrap CSS (via CDN) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container d-flex align-items-center justify-content-center">
<div class="card login-card shadow-lg">
<div class="card-body p-5">

<div class="text-center mb-4">
<h2 class="login-title">ورود به سیستم</h2>
<p class="text-muted">لطفاً اطلاعات خود را وارد کنید</p>
</div>

<form action="#" method="POST">
<!-- Username Field -->
<div class="mb-4">
<label for="username" class="form-label">نام کاربری یا ایمیل</label>
<input type="text" class="form-control custom-input" id="username" placeholder="نام کاربری خود را وارد کنید" required>
</div>

<!-- Password Field -->
<div class="mb-4">
<label for="password" class="form-label">رمز عبور</label>
<input type="password" class="form-control custom-input" id="password" placeholder="********" required>
</div>
<!-- Remember Me & Forgot Password -->
<div class="d-flex justify-content-between align-items-center mb-4">
<div class="form-check">
<input class="form-check-input" type="checkbox" id="remember">
<label class="form-check-label small" for="remember">مرا به خاطر بسپار</label>
</div>
<a href="#" class="forgot-link small">فراموشی رمز عبور؟</a>
</div>

<!-- Submit Button -->
<div class="d-grid">
<button type="submit" class="btn btn-login">ورود</button>
</div>
</form>

<div class="text-center mt-4">
<p class="small text-muted">هنوز عضو نشده اید؟ <a href="#" class="register-link">ثبت نام کنید</a></p>
</div‌
</div>
</div>
</div>

<!-- Bootstrap JS (Optional, but good for structure) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
